<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB-_OUU_YKF8IJpk9_lr91hjllScz7t4So",
        authDomain: "mndp-68988.firebaseapp.com",
        projectId: "mndp-68988",
        storageBucket: "mndp-68988.firebasestorage.app",
        messagingSenderId: "104558849417",
        appId: "1:104558849417:web:68b1e6dc9c0277f08a4558"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const DB_CONTENT = [
        {id:1, type:'hero', category:'تحليل', title:'سيادة البيانات: المعركة الصامتة لاستعادة الاستقلال الرقمي', author:'إبراهيم ناصر'},
        {id:2, type:'standard', category:'اقتصاد', title:'مستقبل العملات اللامركزية', author:'سارة محمود'},
        {id:3, type:'standard', category:'ثقافة', title:'الذكاء الاصطناعي والإبداع', author:'د. يوسف زيد'}
    ];

    const UI = {
        init() {
            this.renderHome();
            this.setupListeners();
            this.checkAdminAccess();
        },

        checkAdminAccess() {
            const params = new URLSearchParams(window.location.search);
            if(params.get('admin') === 'Independent2026') {
                document.getElementById('admin-sidebar-link').style.display = 'block';
            }
        },

        renderHome() {
            const hero = document.getElementById('hero-slot');
            const stream = document.getElementById('main-stream');
            const invContainer = document.getElementById('investigations-container');
            hero.innerHTML = ''; stream.innerHTML = ''; invContainer.innerHTML = '';

            DB_CONTENT.forEach(item => {
                const card = document.createElement('div');
                card.className = item.type === 'hero' ? 'card hero-card' : 'card';
                card.innerHTML = `
                    <span style="font-size:11px; opacity:.6">${item.category}</span>
                    <h2 style="margin-top:8px">${item.title}</h2>
                    <div style="margin-top:20px; font-size:12px; opacity:.5">${item.author}</div>
                `;
                card.onclick = () => this.navigate('article', item.id);

                if(item.type === 'hero') hero.appendChild(card);
                else stream.appendChild(card);

                const invCard = card.cloneNode(true);
                invCard.onclick = () => this.navigate('article', item.id);
                invCard.style.marginBottom = "20px";
                invContainer.appendChild(invCard);
            });
        },

        navigate(view, id) {
            this.toggleSidebar(false);
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            
            const targetLink = document.querySelector(`.sidebar-link[data-target="${view}"]`);
            if(targetLink) targetLink.classList.add('active');

            if(view === 'article' && id) {
                const article = DB_CONTENT.find(a => a.id === id);
                if(article) {
                    document.getElementById('article-container').innerHTML = `
                        <h1>${article.title}</h1>
                        <div style="opacity:.6; margin-bottom:20px">${article.category} • ${article.author}</div>
                        <div class="article-content">هذا نص تجريبي لمحتوى المقال.</div>
                    `;
                }
            }

            const viewEl = document.getElementById(view + '-view');
            if(viewEl) viewEl.classList.add('active');
            window.scrollTo(0,0);
        },

        toggleSidebar(show) {
            document.getElementById('sidebar').classList.toggle('open', show);
            document.getElementById('sidebar-overlay').classList.toggle('active', show);
        },

        setupListeners() {
            document.getElementById('menu-toggle').onclick = () => this.toggleSidebar(true);
            document.getElementById('sidebar-overlay').onclick = () => this.toggleSidebar(false);
            document.getElementById('theme-toggle').onclick = () => {
                const dark = document.body.getAttribute('data-theme') === 'dark';
                document.body.setAttribute('data-theme', dark ? 'light' : 'dark');
            };

            // FIXED SUBSCRIPTION LOGIC
            document.getElementById('news-submit').onclick = async () => {
                const emailField = document.getElementById('news-email');
                const submitBtn = document.getElementById('news-submit');
                const email = emailField.value.trim();

                if (email.includes('@')) {
                    submitBtn.innerText = "...جاري الحفظ";
                    submitBtn.disabled = true;

                    try {
                        await db.collection("subscribers").add({
                            email: email,
                            date: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        document.getElementById('newsletter-form').innerHTML = "<div style='color:#34C759;font-weight:600;'>✓ تم الاشتراك بنجاح</div>";
                    } catch (error) {
                        console.error("Firebase Error:", error);
                        alert("خطأ: تأكد من إعدادات Firestore Rules");
                        submitBtn.innerText = "اشتراك";
                        submitBtn.disabled = false;
                    }
                } else {
                    alert("يرجى إدخال بريد إلكتروني صحيح");
                }
            };

            // ADMIN SEND LOGIC
            document.getElementById('admin-send').onclick = async () => {
                const title = document.getElementById('post-title').value;
                const link = document.getElementById('post-link').value;
                const btn = document.getElementById('admin-send');
                const GITHUB_TOKEN = prompt("الرجاء إدخال رمز الوصول (Token):");

                if(!GITHUB_TOKEN) return alert("يجب إدخال الرمز للمتابعة");
                if(!title || !link) return alert("يرجى إكمال الحقول");

                btn.innerText = "جاري تفعيل الإرسال...";
                btn.disabled = true;

                try {
                    const snapshot = await db.collection("subscribers").get();
                    const emails = snapshot.docs.map(doc => ({ email: doc.data().email }));

                    if(emails.length === 0) throw new Error("قاعدة البيانات فارغة - لا يوجد مشتركين");

                    const response = await fetch(`https://api.github.com/repos/Plaguea/symmetrical-potato/dispatches`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${GITHUB_TOKEN.trim()}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            event_type: 'send-newsletter',
                            client_payload: { title, link, emails }
                        })
                    });

                    if(response.ok || response.status === 204) {
                        alert("✅ تم بنجاح! سيتم إرسال الإيميلات الآن.");
                        UI.navigate('home');
                    } else {
                        const errData = await response.json();
                        alert("❌ فشل: " + (errData.message || "رمز غير صالح"));
                    }
                } catch (e) {
                    alert("خطأ: " + e.message);
                } finally {
                    btn.innerText = "إرسال الآن";
                    btn.disabled = false;
                }
            };

            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.onclick = () => this.navigate(link.getAttribute('data-target'));
            });
        }
    };

    UI.init();
</script>
