<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>المستقلة | Apple Aesthetic Edition</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
:root{
--bg:#F5F5F7;
--bg-rgb:245,245,247;
--fg:#1D1D1F;
--surface:#ffffff;
--subtle:#86868B;
--border:rgba(0,0,0,0.06);
--shadow-sm:0 2px 8px rgba(0,0,0,0.04);
--shadow-md:0 20px 40px rgba(0,0,0,0.08);
--transition:cubic-bezier(0.4,0,0.2,1);
--sidebar-width:240px;
}

[data-theme="dark"]{
--bg:#000000;
--bg-rgb:0,0,0;
--fg:#F5F5F7;
--surface:#1C1C1E;
--subtle:#8E8E93;
--border:rgba(255,255,255,0.08);
--shadow-sm:0 2px 10px rgba(0,0,0,0.4);
--shadow-md:0 20px 40px rgba(0,0,0,0.6);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}

body{
font-family:'IBM Plex Sans Arabic',sans-serif;
background:var(--bg);
color:var(--fg);
transition:background .6s var(--transition),color .4s var(--transition);
overflow-x:hidden;
-webkit-tap-highlight-color:transparent;
}

button{
cursor:pointer;
background:none;
border:none;
color:inherit;
transition:.2s var(--transition);
}

button:active{opacity:.6;transform:scale(.96)}

.container{
max-width:820px;
margin:0 auto;
padding:100px 20px 60px;
}

.app-header{
position:fixed;
top:0;
width:100%;
height:64px;
background:rgba(var(--bg-rgb),.7);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
border-bottom:1px solid var(--border);
z-index:1000;
}

#sidebar-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.15);
backdrop-filter:blur(4px);
opacity:0;
visibility:hidden;
transition:.4s var(--transition);
z-index:1500;
}

#sidebar-overlay.active{opacity:1;visibility:visible}

.sidebar{
position:fixed;
right:0;
top:0;
height:100%;
width:var(--sidebar-width);
background:var(--surface);
transform:translateX(100%);
transition:.4s var(--transition);
padding:80px 30px;
box-shadow:-10px 0 30px rgba(0,0,0,.08);
z-index:2000;
border-left:1px solid var(--border);
}

.sidebar.open{transform:translateX(0)}

.sidebar-link{
display:block;
margin-bottom:24px;
font-size:18px;
font-weight:500;
opacity:.6;
transition:.3s;
cursor: pointer;
}

.sidebar-link.active{opacity:1;font-weight:600}
.sidebar-link:hover{opacity:1;transform:translateX(-6px)}

#main-stream{
display:flex;
gap:20px;
overflow-x:auto;
padding:10px 5px 30px;
scroll-snap-type:x mandatory;
scrollbar-width:none;
}
#main-stream::-webkit-scrollbar{display:none}

.card{
background:var(--surface);
border-radius:22px;
padding:24px;
min-width:280px;
box-shadow:var(--shadow-sm);
border:1px solid var(--border);
scroll-snap-align:start;
transition:.3s var(--transition);
cursor: pointer;
}

.card:hover{
transform:translateY(-5px);
box-shadow:var(--shadow-md);
}

.hero-card{
background:var(--fg);
color:var(--bg);
padding:32px;
margin-bottom:30px;
border-radius:28px;
}

.newsletter-box,.admin-box{
background:var(--surface);
padding:40px 24px;
border-radius:24px;
text-align:center;
box-shadow:var(--shadow-sm);
margin:60px auto;
max-width:450px;
border:1px solid var(--border);
}

.input-field{
width:100%;
padding:14px 20px;
border-radius:12px;
border:1px solid var(--border);
background:var(--bg);
color:var(--fg);
outline:none;
margin-top:10px;
font-family:inherit;
}

.primary-btn{
width:100%;
background:var(--fg);
color:var(--bg);
padding:14px;
border-radius:12px;
font-weight:600;
margin-top:12px;
}

.view{display:none}
.view.active{display:block;animation:fade .4s}
@keyframes fade{from{opacity:0}to{opacity:1}}

.article-content{
line-height:1.9;
opacity:.85;
margin-top:20px;
}
</style>
</head>

<body data-theme="light">

<div id="sidebar-overlay"></div>

<header class="app-header">
<button id="menu-toggle">☰</button>
<div style="font-weight:700;">المستقلة</div>
<button id="theme-toggle">◐</button>
</header>

<aside class="sidebar" id="sidebar">
<nav>
<a class="sidebar-link active" data-target="home">الرئيسية</a>
<a class="sidebar-link" data-target="investigations">آخر التحقيقات</a>
<a class="sidebar-link" data-target="about">عن المستقلة</a>
<hr style="margin:20px 0;opacity:.1">
<a class="sidebar-link" id="admin-sidebar-link" data-target="admin" style="display:none;font-size:12px;opacity:.4">لوحة التحكم</a>
</nav>
</aside>

<main class="container">

<div id="home-view" class="view active">
<div id="hero-slot"></div>
<div id="main-stream"></div>

<section class="newsletter-box">
<h3>نشرة المستقلة</h3>
<p style="opacity:.6;font-size:14px">اشترك لتصلك تحقيقاتنا فور صدورها.</p>
<div id="newsletter-form">
<input type="email" id="news-email" class="input-field" placeholder="بريدك الإلكتروني">
<button class="primary-btn" id="news-submit">اشتراك</button>
</div>
</section>
</div>

<div id="investigations-view" class="view">
<h2 style="margin-bottom:30px">آخر التحقيقات</h2>
<div id="investigations-container"></div>
</div>

<div id="about-view" class="view">
<h2 style="margin-bottom:20px">عن المستقلة</h2>
<p style="line-height:1.9;opacity:.8">
منصة تحليلية مستقلة تهدف إلى تقديم محتوى معمق بعيداً عن الضجيج الإعلامي.
</p>
</div>

<div id="admin-view" class="view">
<div class="admin-box">
<h3>إرسال تنبيه للمشتركين</h3>
<p style="font-size:12px; opacity:0.6; margin-bottom:10px;">سيتم تفعيل GitHub Action لإرسال الإيميلات بأمان.</p>
<input type="text" id="post-title" class="input-field" placeholder="عنوان المنشور الجديد">
<input type="text" id="post-link" class="input-field" placeholder="رابط المنشور (URL)">
<button class="primary-btn" id="admin-send">إرسال الآن</button>
<button onclick="UI.navigate('home')" style="margin-top:15px;font-size:13px;opacity:.5">إلغاء</button>
</div>
</div>

<div id="article-view" class="view">
<button onclick="UI.navigate('home')" style="margin-bottom:30px;opacity:.5">← العودة</button>
<div id="article-container"></div>
</div>

</main>

<script>
const firebaseConfig={
apiKey: "AIzaSyB-_OUU_YKF8IJpk9_lr91hjllScz7t4So",
authDomain: "mndp-68988.firebaseapp.com",
projectId: "mndp-68988",
storageBucket: "mndp-68988.firebasestorage.app",
messagingSenderId: "104558849417",
appId: "1:104558849417:web:68b1e6dc9c0277f08a4558"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const DB_CONTENT=[
{id:1,type:'hero',category:'تحليل',title:'سيادة البيانات: المعركة الصامتة لاستعادة الاستقلال الرقمي',author:'إبراهيم ناصر'},
{id:2,type:'standard',category:'اقتصاد',title:'مستقبل العملات اللامركزية',author:'سارة محمود'},
{id:3,type:'standard',category:'ثقافة',title:'الذكاء الاصطناعي والإبداع',author:'د. يوسف زيد'}
];

const UI={
init(){
this.renderHome();
this.setupListeners();
this.checkAdminAccess();
},

checkAdminAccess(){
const params=new URLSearchParams(window.location.search);
if(params.get('admin')==='Independent2026'){
document.getElementById('admin-sidebar-link').style.display='block';
}
},

renderHome(){
const hero=document.getElementById('hero-slot');
const stream=document.getElementById('main-stream');
const invContainer=document.getElementById('investigations-container');
hero.innerHTML=''; stream.innerHTML=''; invContainer.innerHTML='';

DB_CONTENT.forEach(item=>{
const card=document.createElement('div');
card.className=item.type==='hero'?'card hero-card':'card';
card.innerHTML=`
<span style="font-size:11px;opacity:.6">${item.category}</span>
<h2 style="margin-top:8px">${item.title}</h2>
<div style="margin-top:20px;font-size:12px;opacity:.5">${item.author}</div>
`;
card.onclick=()=>this.navigate('article',item.id);

if(item.type==='hero') hero.appendChild(card);
else stream.appendChild(card);

// Clone card for investigations view
const invCard = card.cloneNode(true);
invCard.onclick=()=>this.navigate('article',item.id);
invCard.style.marginBottom = "20px";
invContainer.appendChild(invCard);
});
},

navigate(view,id){
this.toggleSidebar(false);
document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active'));
const activeLink=document.querySelector(`[data-target="${view}"]`);
if(activeLink)activeLink.classList.add('active');

if(view==='article'&&id){
const article=DB_CONTENT.find(a=>a.id===id);
if(article){
document.getElementById('article-container').innerHTML=`
<h1>${article.title}</h1>
<div style="opacity:.6;margin-bottom:20px">${article.category} • ${article.author}</div>
<div class="article-content">هذا نص تجريبي لمحتوى المقال. لاحقاً سيتم ربطه بقاعدة البيانات لعرض المحتوى الحقيقي.</div>
`;
}
}

document.getElementById(view+'-view').classList.add('active');
window.scrollTo(0,0);
},

toggleSidebar(show){
document.getElementById('sidebar').classList.toggle('open',show);
document.getElementById('sidebar-overlay').classList.toggle('active',show);
},

setupListeners(){
document.getElementById('menu-toggle').onclick=()=>this.toggleSidebar(true);
document.getElementById('sidebar-overlay').onclick=()=>this.toggleSidebar(false);
document.getElementById('theme-toggle').onclick=()=>{
const dark=document.body.getAttribute('data-theme')==='dark';
document.body.setAttribute('data-theme',dark?'light':'dark');
};

document.getElementById('news-submit').onclick=async()=>{
const emailField = document.getElementById('news-email');
const email=emailField.value;
if(email.includes('@')){
await db.collection("subscribers").add({email,date:new Date()});
document.getElementById('newsletter-form').innerHTML="✓ تم الاشتراك بنجاح";
}
};

// PREPARING GITHUB TRIGGER (NEXT STEP)
document.getElementById('admin-send').onclick=async()=>{
    const title = document.getElementById('post-title').value;
    const link = document.getElementById('post-link').value;
    if(!title || !link) return alert("يرجى إكمال الحقول");
    
    alert("سيتم ربط هذا الزر بـ GitHub Action في الخطوة القادمة لإرسال الإيميلات بأمان.");
};

document.querySelectorAll('.sidebar-link').forEach(link=>{
link.onclick=()=>this.navigate(link.getAttribute('data-target'));
});
}
};

UI.init();
</script>

</body>
</html>
